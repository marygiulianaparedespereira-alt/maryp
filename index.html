<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veterinaria-Patitas</title>
    <link rel="stylesheet" href="styless.css" />
  </head>
  <body>
    <header>
      <h1>Patitas-COCO</h1>
      <p>"Reservá el turno de tu mascota online"</p>
    </header>
    <main>
      <form action="">
        <section>
          <h3>Tus Datos</h3>
          <label for="Datos">Datos Personales</label>
          <input type="text" id="nombre" name="nombre" required />
          <label for="Datos">Email</label>
          <input type="email" , id="email" , name="email" , required />
          <label for="Datos">Telefono</label>
          <input type="text" , id="telefono" , name="telefono" />
        </section>
        <section>
          <label for="Datos de tu mascota">Datos de tu Mascota</label>
          <input type="text" , id="mascota" , name="mascota" , required />
          <label for="Especie">Especie</label>
          <select name="" id="">
            <option value="">-- Elegí una --</option>
            <option value="Gato">Terrestres</option>
            <option value="Perro">Terrestres</option>
            <option value="Ave">Voladores</option>
            <option value="Pez">Acuatico</option>
          </select>
          <label for="Peso">Peso Aproximado</label>
          <input type="number" , id="peso" , name="peso" , min="0" />
        </section>
        <section>
          <div class="CONTROL"></div>
          <label for="CONTROL">Control</label>
          <input type="text" , id="Control" , name="Control" , required />
          <div class=""></div>
        </section>
        <section>
          <div class="checkbox1"></div>
          <label for="lunes">Dia Lunes</label>
          <input
            type="checkbox"
            id="lunes"
            name="dia_lunes"
            value="lunes"
            →
            Lunes
          />
          <div class="checkbox2"></div>
          <label for="checkbox">Dia Miercoles</label>
          <input
            type="checkbox"
            id="miercoles"
            name="dia_miercoles"
            value="miercoles"
            →
            Miércoles
          />
          <div class="checkbox2"></div>
          <label for="checkbox">Dia Viernes</label>
          <input
            type="checkbox"
            id="viernes"
            name="dia_viernes"
            value="viernes"
            →
            Viernes
          />
          <div class="checkbox3"></div>
          <label for="checkbox">Dia Sabado</label>
          <input
            type="checkbox"
            id="sabado"
            name="dia_sabado"
            value="sabado"
            →
            Sábado
          />
        </section>
      </form>
    </main>
  </body>
</html>
